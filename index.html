<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Confluencia">
<meta name="theme-color" content="#080E18">
<title>Confluencia · Scanner</title>
<style>
:root{
  --bg:#080E18; --card:#0D1520; --card2:#122030; --border:#1A2D45;
  --t0:#E2EAF6; --t1:#8BA5C2; --t2:#3E5872;
  --buy:#00C27A; --buyg:rgba(0,194,122,.13); --buyb:rgba(0,194,122,.42);
  --sell:#FF3D5A; --sellg:rgba(255,61,90,.13); --sellb:rgba(255,61,90,.42);
  --acc:#4080FF; --accd:rgba(64,128,255,.14); --warn:#FFB020;
  --r:16px;
  --ui:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--t0);font-family:var(--ui);
     -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;min-height:100dvh}
button{font-family:inherit;border:none;background:none;color:inherit;
       cursor:pointer;-webkit-tap-highlight-color:transparent}
input{font-family:inherit;-webkit-appearance:none;appearance:none}

.wrap{max-width:520px;margin:0 auto;padding:0 14px calc(28px + env(safe-area-inset-bottom))}

/* ── Header ── */
.hdr{
  position:sticky;top:0;z-index:20;
  padding:calc(8px + env(safe-area-inset-top)) 0 10px;
  background:linear-gradient(var(--bg) 78%,transparent);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.hdr-l h1{font-size:18px;font-weight:800;letter-spacing:-.03em;color:var(--t0)}
.hdr-l h1 em{font-style:normal;color:var(--acc)}
.hdr-sub{font-size:11px;color:var(--t2);margin-top:4px;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--buy);animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{50%{opacity:.15}}
.hdr-r{display:flex;gap:7px;padding-top:2px}
.hbtn{min-width:44px;min-height:44px;border-radius:12px;
      background:var(--card);border:1px solid var(--border);
      color:var(--t1);font-size:18px;display:grid;place-items:center}
.hbtn.on{color:var(--warn);border-color:rgba(255,176,32,.4)}
#rbtn{transition:transform .5s}
#rbtn.spin{transform:rotate(360deg)}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);padding:10px 12px}
.stat .v{font-size:24px;font-weight:800;font-family:var(--mono);line-height:1}
.stat .l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.s-all .v{color:var(--acc)}
.s-buy .v{color:var(--buy)}
.s-sell .v{color:var(--sell)}

/* ── Tabs ── */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;min-height:40px;border-radius:10px;
     font-size:13px;font-weight:600;
     background:var(--card);border:1px solid var(--border);color:var(--t2);
     transition:background .15s,border-color .15s,color .15s}
.tab.ta{background:var(--accd);border-color:rgba(64,128,255,.4);color:var(--acc)}
.tab.tb{background:var(--buyg);border-color:var(--buyb);color:var(--buy)}
.tab.ts{background:var(--sellg);border-color:var(--sellb);color:var(--sell)}

/* ── Progreso ── */
.pgwrap{margin-bottom:12px;display:none}
.pglbl{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:6px}
.pgtrack{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.pgbar{height:100%;background:var(--acc);border-radius:2px;transition:width .3s}

/* ── Banner ── */
#banner{
  position:fixed;left:14px;right:14px;
  top:calc(8px + env(safe-area-inset-top));z-index:50;
  max-width:492px;margin:0 auto;padding:13px 14px;
  border-radius:14px;display:none;align-items:center;gap:12px;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  box-shadow:0 16px 48px rgba(0,0,0,.55)
}
#banner.buy{background:rgba(0,35,22,.94);border:1px solid var(--buyb);display:flex;animation:drop .3s cubic-bezier(.2,.9,.3,1.1)}
#banner.sell{background:rgba(55,10,20,.94);border:1px solid var(--sellb);display:flex;animation:drop .3s cubic-bezier(.2,.9,.3,1.1)}
@keyframes drop{from{transform:translateY(-18px);opacity:0}to{transform:none;opacity:1}}
#banner strong{font-size:15px;line-height:1.3}
#banner p{font-size:12px;color:var(--t1);margin-top:3px;line-height:1.4}
#banner .bcls{margin-left:auto;min-width:44px;min-height:44px;color:var(--t1);font-size:16px;display:grid;place-items:center}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);margin-bottom:10px;overflow:hidden;
      transition:border-color .2s,box-shadow .2s;
      animation:fin .3s ease}
@keyframes fin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card.cbuy{border-color:var(--buyb);box-shadow:0 0 24px var(--buyg)}
.card.csell{border-color:var(--sellb);box-shadow:0 0 24px var(--sellg)}

.chead{width:100%;display:flex;align-items:center;gap:12px;
       padding:13px 14px;text-align:left;min-height:76px}

/* Ring */
.ring{flex-shrink:0;position:relative;width:54px;height:54px}
.ring svg{transform:rotate(-90deg);display:block}
.rcnt{position:absolute;inset:0;display:grid;place-items:center;
      font-size:13px;font-weight:700;font-family:var(--mono)}
.rcnt.rb{color:var(--buy)}.rcnt.rs{color:var(--sell)}.rcnt.rn{color:var(--t2)}

.cmid{flex:1;min-width:0}
.crow1{display:flex;align-items:center;gap:7px}
.csym{font-size:16px;font-weight:700}
.csec{font-size:10px;font-weight:700;color:var(--t2);background:rgba(255,255,255,.06);
      padding:2px 7px;border-radius:6px;letter-spacing:.02em;text-transform:uppercase}
.cname{font-size:11px;color:var(--t2);margin-top:3px;
       white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.cbadge{margin-top:5px;display:inline-flex;align-items:center;gap:5px;
        font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.cbadge.bb{background:var(--buyg);color:var(--buy)}
.cbadge.bs{background:var(--sellg);color:var(--sell)}

.cprice{text-align:right;flex-shrink:0}
.cval{font-size:16px;font-weight:600;font-family:var(--mono)}
.cdelta{font-size:12px;font-family:var(--mono);margin-top:3px}
.cdelta.up{color:var(--buy)}.cdelta.dn{color:var(--sell)}

.detail{border-top:1px solid var(--border);display:none;padding:0 14px}
.card.open .detail{display:block}
.srow{display:flex;align-items:flex-start;gap:10px;padding:11px 0;min-height:44px}
.srow+.srow{border-top:1px solid rgba(255,255,255,.04)}
.sdot{width:9px;height:9px;border-radius:50%;margin-top:4px;flex-shrink:0}
.sdot.BUY{background:var(--buy);box-shadow:0 0 6px rgba(0,194,122,.5)}
.sdot.SELL{background:var(--sell);box-shadow:0 0 6px rgba(255,61,90,.5)}
.sdot.NEUTRAL{background:var(--t2)}
.si{flex:1}
.sname{font-size:13px;font-weight:600}
.sdesc{font-size:12px;color:var(--t1);margin-top:2px;line-height:1.4}
.ssig{font-size:11px;font-weight:700;padding-left:8px;margin-top:2px;flex-shrink:0}
.ssig.BUY{color:var(--buy)}.ssig.SELL{color:var(--sell)}.ssig.NEUTRAL{color:var(--t2)}

/* ── Add section ── */
.addsec{background:var(--card);border:1px solid var(--border);
        border-radius:var(--r);padding:14px;margin-bottom:12px}
.addsec h3{font-size:12px;font-weight:700;color:var(--t2);
           text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.addrow{display:flex;gap:8px}
.addinp{flex:1;min-height:44px;border-radius:10px;
        border:1px solid var(--border);background:var(--card2);
        color:var(--t0);padding:0 14px;font-size:16px;text-transform:uppercase}
.addinp::placeholder{color:var(--t2);text-transform:none}
.addinp:focus{outline:none;border-color:var(--acc)}
.addbtn{min-width:80px;min-height:44px;border-radius:10px;
        background:var(--acc);color:#fff;font-weight:700;font-size:14px}
.addbtn:disabled{opacity:.38}

/* ── Misc ── */
.empty{text-align:center;padding:44px 20px;color:var(--t1);font-size:14px;line-height:1.6}
.errl{background:var(--sellg);border:1px solid var(--sellb);
      color:var(--sell);border-radius:12px;padding:10px 14px;
      font-size:12px;margin-bottom:10px;line-height:1.5}
.connerr{background:var(--card);border:1px solid var(--border);
         border-radius:var(--r);padding:32px 20px;text-align:center;margin-bottom:12px}
.connerr p{font-size:14px;color:var(--t1);line-height:1.6;margin-bottom:16px}
.retbtn{min-height:44px;padding:0 28px;border-radius:10px;
        background:var(--acc);color:#fff;font-weight:700;font-size:14px}
.disc{font-size:11px;color:var(--t2);text-align:center;line-height:1.5;padding:8px 4px 0}

@media(prefers-reduced-motion:reduce){
  .live-dot,#rbtn,.card,#banner{animation:none!important}
}
</style>
</head>
<body>
<div class="wrap">

<div id="banner" role="alert">
  <div><strong id="btitle"></strong><p id="btext"></p></div>
  <button class="bcls" onclick="closeBanner()" aria-label="Cerrar">✕</button>
</div>

<header class="hdr">
  <div class="hdr-l">
    <h1>CONFLUENCIA <em>·</em> SCANNER</h1>
    <div class="hdr-sub">
      <span class="live-dot"></span>
      <span id="stxt">Iniciando…</span>
    </div>
  </div>
  <div class="hdr-r">
    <button class="hbtn" id="nbtn" onclick="toggleNotif()" aria-label="Notificaciones">🔕</button>
    <button class="hbtn" id="rbtn" onclick="startScan()" aria-label="Rescanear">↻</button>
  </div>
</header>

<div class="stats">
  <div class="stat s-all"><div class="v" id="st0">—</div><div class="l">Analizados</div></div>
  <div class="stat s-buy"><div class="v" id="st1">—</div><div class="l">▲ Compra</div></div>
  <div class="stat s-sell"><div class="v" id="st2">—</div><div class="l">▼ Venta</div></div>
</div>

<div class="tabs">
  <button class="tab ta" id="ta" onclick="setF('ALL')">Todas</button>
  <button class="tab" id="tb" onclick="setF('BUY')">▲ Compra</button>
  <button class="tab" id="ts" onclick="setF('SELL')">▼ Venta</button>
</div>

<div class="pgwrap" id="pgwrap">
  <div class="pglbl"><span id="pglbl">Escaneando…</span><span id="pgpct">0%</span></div>
  <div class="pgtrack"><div class="pgbar" id="pgbar" style="width:0%"></div></div>
</div>

<div id="errs"></div>
<div id="zone"></div>

<div class="addsec">
  <h3>Añadir activo propio</h3>
  <div class="addrow">
    <input class="addinp" id="ainp" placeholder="Ej: BABA, ^FTSE, SOL-USD"
      inputmode="text" autocapitalize="characters" autocorrect="off" enterkeyhint="done"
      oninput="onAI()" onkeydown="if(event.key==='Enter')addCustom()">
    <button class="addbtn" id="abtn" onclick="addCustom()" disabled>Añadir</button>
  </div>
</div>

<p class="disc">Herramienta educativa. Las señales técnicas no garantizan resultados y no constituyen asesoría financiera. Invierte solo lo que puedas permitirte perder.</p>
</div>

<script>
/* =================================================================
   CONFLUENCIA · SCANNER v2.1
   — Auto-escanea 20 activos del mercado mundial
   — 5 estrategias técnicas por activo
   — Alerta cuando ≥ 2 coinciden (confluencia)
   — Ranking en tiempo real por fuerza de señal
   ================================================================= */

// ── Universo de activos ──────────────────────────────────────────
const UNIVERSE = [
  {sym:'AAPL',  sec:'Tech'},    {sym:'MSFT',    sec:'Tech'},
  {sym:'NVDA',  sec:'Tech'},    {sym:'GOOGL',   sec:'Tech'},
  {sym:'META',  sec:'Tech'},    {sym:'AMZN',    sec:'Consumo'},
  {sym:'TSLA',  sec:'EV'},      {sym:'JPM',     sec:'Banca'},
  {sym:'V',     sec:'Pagos'},   {sym:'JNJ',     sec:'Salud'},
  {sym:'LLY',   sec:'Farma'},   {sym:'XOM',     sec:'Energía'},
  {sym:'NFLX',  sec:'Media'},   {sym:'SPY',     sec:'ETF'},
  {sym:'QQQ',   sec:'ETF'},     {sym:'GLD',     sec:'Materias'},
  {sym:'BTC-USD',sec:'Cripto'}, {sym:'ETH-USD', sec:'Cripto'},
  {sym:'^GSPC', sec:'Índice'},  {sym:'^NDX',    sec:'Índice'},
];

// ── Persistencia de símbolos personalizados ──────────────────────
let customSyms = [];
try { const r = localStorage.getItem('cf.custom'); if(r) customSyms = JSON.parse(r); } catch(_){}
const saveCS = () => { try { localStorage.setItem('cf.custom', JSON.stringify(customSyms)); } catch(_){} };

// ── Estado ───────────────────────────────────────────────────────
let results   = [];
let errors    = [];
let filt      = 'ALL';
let scanning  = false;
let notifOn   = false;
let prevCF    = {};
let pollTimer = null;
let scanTotal = 0;
let scanDone  = 0;

// ── Fetch con cascade de proxies ─────────────────────────────────
async function fetchYahoo(sym) {
  const url1 = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=6mo`;
  const url2 = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=6mo`;
  const attempts = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url1)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url2)}`,
    `https://corsproxy.io/?${encodeURIComponent(url1)}`,
    `https://thingproxy.freeboard.io/fetch/${url1}`,
  ];
  let lastErr = 'Sin conexión';
  for (const a of attempts) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 9000);
      const res = await fetch(a, { signal: ctrl.signal, cache: 'no-store' });
      clearTimeout(t);
      if (!res.ok) { lastErr = `HTTP ${res.status}`; continue; }
      return await res.json();
    } catch(e) { lastErr = e.name === 'AbortError' ? 'Tiempo de espera agotado' : (e.message||'Error'); }
  }
  throw new Error(lastErr);
}

function parseYahoo(json, sym, sec) {
  if (json.chart?.error) throw new Error(json.chart.error.description || 'Símbolo no encontrado');
  const r = json.chart?.result?.[0];
  if (!r?.timestamp) throw new Error('Sin datos para ' + sym);
  const qc = r.indicators.quote[0] || {};
  const rawC = qc.close || [], rawH = qc.high || [], rawL = qc.low || [];
  const ts=[], C=[], H=[], L=[];
  r.timestamp.forEach((t,i) => {
    const c = rawC[i];
    if (c != null && isFinite(c)) { ts.push(t); C.push(c); H.push(rawH[i]??c); L.push(rawL[i]??c); }
  });
  if (C.length < 50) throw new Error(`Historial insuficiente (${C.length} barras)`);
  const price = r.meta.regularMarketPrice ?? C[C.length-1];
  const prev  = r.meta.chartPreviousClose ?? r.meta.previousClose ?? C[C.length-2];
  return {
    sym, sec,
    name: r.meta.longName ?? r.meta.shortName ?? null,
    cur:  r.meta.currency ?? null,
    price, prev, C, H, L,
  };
}

// ── Indicadores técnicos puros ───────────────────────────────────
const sma = (v,p) => {
  const o = new Array(v.length).fill(null); let s=0;
  for(let i=0;i<v.length;i++){s+=v[i];if(i>=p)s-=v[i-p];if(i>=p-1)o[i]=s/p;}
  return o;
};
const ema = (v,p) => {
  const o = new Array(v.length).fill(null);
  if(v.length<p) return o;
  const k=2/(p+1); let pr=v.slice(0,p).reduce((a,b)=>a+b,0)/p; o[p-1]=pr;
  for(let i=p;i<v.length;i++){pr=v[i]*k+pr*(1-k);o[i]=pr;}
  return o;
};
const rsiSeries = (v,p=14) => {
  const o=new Array(v.length).fill(null);
  if(v.length<=p) return o;
  let ag=0,al=0;
  for(let i=1;i<=p;i++){const c=v[i]-v[i-1];ag+=Math.max(c,0);al+=Math.max(-c,0);}
  ag/=p; al/=p; o[p]=al===0?100:100-100/(1+ag/al);
  for(let i=p+1;i<v.length;i++){
    const c=v[i]-v[i-1];
    ag=(ag*(p-1)+Math.max(c,0))/p; al=(al*(p-1)+Math.max(-c,0))/p;
    o[i]=al===0?100:100-100/(1+ag/al);
  }
  return o;
};
const macdCalc = (v,f=12,sl=26,sg=9) => {
  const ef=ema(v,f), es=ema(v,sl);
  const line=v.map((_,i)=>ef[i]!=null&&es[i]!=null?ef[i]-es[i]:null);
  const st=line.findIndex(x=>x!==null);
  const sig=new Array(v.length).fill(null), hist=new Array(v.length).fill(null);
  if(st===-1) return {line,sig,hist};
  const ss=ema(line.slice(st).map(x=>x??0),sg);
  ss.forEach((s,i)=>{ if(s!=null){sig[st+i]=s; hist[st+i]=line[st+i]-s;} });
  return {line,sig,hist};
};
const rolStd = (v,p) => {
  const o=new Array(v.length).fill(null);
  for(let i=p-1;i<v.length;i++){
    const w=v.slice(i-p+1,i+1),m=w.reduce((a,b)=>a+b,0)/p;
    o[i]=Math.sqrt(w.reduce((a,b)=>a+(b-m)**2,0)/(p-1));
  } return o;
};
const bollCalc = (v,p=20,m=2) => {
  const mid=sma(v,p), std=rolStd(v,p);
  return {
    upper: v.map((_,i)=>mid[i]!=null&&std[i]!=null?mid[i]+m*std[i]:null),
    lower: v.map((_,i)=>mid[i]!=null&&std[i]!=null?mid[i]-m*std[i]:null),
  };
};

// ── Estrategias ──────────────────────────────────────────────────
const RB=3;
const recent=(n,bars,fn)=>{ for(let i=n-1;i>=Math.max(1,n-bars);i--)if(fn(i))return i; return null; };

function strSMA({C:v}) {
  const f=sma(v,20), s=sma(v,50), n=v.length;
  const sp=f[n-1]&&s[n-1]?(f[n-1]-s[n-1])/s[n-1]:0;
  const up=recent(n,RB,i=>f[i]!=null&&s[i]!=null&&f[i-1]!=null&&s[i-1]!=null&&f[i]>s[i]&&f[i-1]<=s[i-1]);
  const dn=recent(n,RB,i=>f[i]!=null&&s[i]!=null&&f[i-1]!=null&&s[i-1]!=null&&f[i]<s[i]&&f[i-1]>=s[i-1]);
  if(up!==null) return {id:'sma',name:'Cruce SMA 20/50',signal:'BUY',detail:'Cruce dorado: SMA20 superó a SMA50 — tendencia alcista iniciada.'};
  if(dn!==null) return {id:'sma',name:'Cruce SMA 20/50',signal:'SELL',detail:'Cruce de la muerte: SMA20 cayó bajo SMA50 — tendencia bajista iniciada.'};
  return {id:'sma',name:'Cruce SMA 20/50',signal:'NEUTRAL',detail:sp>0?'Sin cruce reciente. Sesgo alcista de fondo.':'Sin cruce reciente. Sesgo bajista de fondo.'};
}

function strRSI({C:v}) {
  const r=rsiSeries(v,14), n=v.length, cur=r[n-1], prev=r[n-2];
  if(cur==null||prev==null) return {id:'rsi',name:'RSI 14',signal:'NEUTRAL',detail:'Datos insuficientes.'};
  if(cur<35&&cur>prev) return {id:'rsi',name:'RSI 14',signal:'BUY',detail:`RSI ${cur.toFixed(1)} — sobreventa y girando al alza.`};
  if(cur>65&&cur<prev) return {id:'rsi',name:'RSI 14',signal:'SELL',detail:`RSI ${cur.toFixed(1)} — sobrecompra y girando a la baja.`};
  const z=cur>=65?'sobrecompra (sin giro aún)':cur<=35?'sobreventa (sin giro aún)':'zona neutral 35–65';
  return {id:'rsi',name:'RSI 14',signal:'NEUTRAL',detail:`RSI ${cur.toFixed(1)} — ${z}.`};
}

function strMACD({C:v}) {
  const {hist} = macdCalc(v), n=hist.length;
  const up=recent(n,RB,i=>hist[i]!=null&&hist[i-1]!=null&&hist[i]>0&&hist[i-1]<=0);
  const dn=recent(n,RB,i=>hist[i]!=null&&hist[i-1]!=null&&hist[i]<0&&hist[i-1]>=0);
  const h=hist[n-1];
  if(up!==null) return {id:'macd',name:'MACD 12/26/9',signal:'BUY',detail:'Histograma cruzó a positivo — impulso alcista activado.'};
  if(dn!==null) return {id:'macd',name:'MACD 12/26/9',signal:'SELL',detail:'Histograma cruzó a negativo — impulso bajista activado.'};
  return {id:'macd',name:'MACD 12/26/9',signal:'NEUTRAL',detail:h!=null&&h>0?'Histograma positivo, sin cruce reciente.':'Histograma negativo, sin cruce reciente.'};
}

function strBoll({C,H,L}) {
  const {upper,lower}=bollCalc(C,20,2), n=C.length;
  const up=recent(n,RB,i=>lower[i]!=null&&lower[i-1]!=null&&L[i-1]<=lower[i-1]&&C[i]>lower[i]);
  const dn=recent(n,RB,i=>upper[i]!=null&&upper[i-1]!=null&&H[i-1]>=upper[i-1]&&C[i]<upper[i]);
  if(up!==null) return {id:'boll',name:'Bollinger 20/2σ',signal:'BUY',detail:'Rebote desde banda inferior — momentum alcista esperado.'};
  if(dn!==null) return {id:'boll',name:'Bollinger 20/2σ',signal:'SELL',detail:'Rechazo en banda superior — presión bajista esperada.'};
  return {id:'boll',name:'Bollinger 20/2σ',signal:'NEUTRAL',detail:'Precio dentro de las bandas, sin eventos en los extremos.'};
}

function strZ({C:v}) {
  const mid=sma(v,20), std=rolStd(v,20), n=v.length;
  const z=i=>mid[i]!=null&&std[i]!=null&&std[i]>0?(v[i]-mid[i])/std[i]:null;
  const up=recent(n,RB,i=>{const a=z(i-1),b=z(i);return a!=null&&b!=null&&a<=-2&&b>-2;});
  const dn=recent(n,RB,i=>{const a=z(i-1),b=z(i);return a!=null&&b!=null&&a>=2&&b<2;});
  const zn=z(n-1);
  if(up!==null) return {id:'z',name:'Z-score 20D',signal:'BUY',detail:'Salida de z < −2σ — reversión estadística al alza en curso.'};
  if(dn!==null) return {id:'z',name:'Z-score 20D',signal:'SELL',detail:'Salida de z > +2σ — reversión estadística a la baja en curso.'};
  return {id:'z',name:'Z-score 20D',signal:'NEUTRAL',detail:zn!=null?`Desviación actual: ${zn.toFixed(2)}σ (rango normal: ±2σ).`:'Sin datos.'};
}

function evaluate(series) {
  return [strSMA(series), strRSI(series), strMACD(series), strBoll(series), strZ(series)];
}

function calcConfl(signals, thr=2) {
  const buys = signals.filter(s=>s.signal==='BUY');
  const sells = signals.filter(s=>s.signal==='SELL');
  const total = signals.length;
  if(buys.length>=thr && buys.length>sells.length)
    return {action:'BUY', count:buys.length, total, names:buys.map(s=>s.name)};
  if(sells.length>=thr && sells.length>buys.length)
    return {action:'SELL', count:sells.length, total, names:sells.map(s=>s.name)};
  return {action:'NONE', count:Math.max(buys.length,sells.length), total, names:[]};
}

// ── Render ───────────────────────────────────────────────────────
function ringHTML(cf) {
  const N=cf.total, sz=54, r=23, cx=27, gap=10, seg=360/N-gap;
  const lc=cf.action==='BUY'?'var(--buy)':cf.action==='SELL'?'var(--sell)':null;
  let p='';
  for(let i=0;i<N;i++){
    const a0=i*(seg+gap), a1=a0+seg;
    const xy=d=>{const rd=d*Math.PI/180;return[cx+r*Math.cos(rd),cx+r*Math.sin(rd)];};
    const[x1,y1]=xy(a0),[x2,y2]=xy(a1);
    p+=`<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} A${r} ${r} 0 0 1 ${x2.toFixed(1)} ${y2.toFixed(1)}" fill="none" stroke="${lc&&i<cf.count?lc:'var(--border)'}" stroke-width="4.5" stroke-linecap="round"/>`;
  }
  const rc=cf.action==='BUY'?'rb':cf.action==='SELL'?'rs':'rn';
  return `<div class="ring"><svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">${p}</svg><span class="rcnt ${rc}">${cf.count}/${N}</span></div>`;
}

function cardHTML(d) {
  const pct=d.prev>0?(d.price-d.prev)/d.prev*100:0;
  const up=pct>=0;
  const cc=d.cf.action==='BUY'?'cbuy':d.cf.action==='SELL'?'csell':'';
  const badge=d.cf.action!=='NONE'
    ?`<span class="cbadge ${d.cf.action==='BUY'?'bb':'bs'}">${d.cf.action==='BUY'?'▲':'▼'} ${d.cf.count}/${d.cf.total} ESTRATEGIAS</span>`:'';
  const rows=d.strategies.map(s=>`
    <div class="srow">
      <span class="sdot ${s.signal}"></span>
      <div class="si"><div class="sname">${s.name}</div><div class="sdesc">${s.detail}</div></div>
      <span class="ssig ${s.signal}">${s.signal==='BUY'?'COMPRA':s.signal==='SELL'?'VENTA':'—'}</span>
    </div>`).join('');
  const c=d.cur?` ${d.cur}`:'';
  return `<article class="card ${cc}" id="c-${d.sym}">
    <button class="chead" onclick="tog('${d.sym}')" aria-expanded="false">
      ${ringHTML(d.cf)}
      <div class="cmid">
        <div class="crow1"><span class="csym">${d.sym}</span><span class="csec">${d.sec}</span></div>
        ${d.name?`<div class="cname">${d.name}</div>`:''}
        ${badge}
      </div>
      <div class="cprice">
        <div class="cval">${d.price.toLocaleString('es',{maximumFractionDigits:2})}${c}</div>
        <div class="cdelta ${up?'up':'dn'}">${up?'+':''}${pct.toFixed(2)}%</div>
      </div>
    </button>
    <div class="detail">${rows}</div>
  </article>`;
}

function tog(sym) {
  const el=document.getElementById('c-'+sym); if(!el) return;
  const o=el.classList.toggle('open');
  el.querySelector('.chead').setAttribute('aria-expanded',o);
}

function renderCards() {
  const zone=document.getElementById('zone');
  const list=filt==='ALL'?results:results.filter(r=>r.cf.action===filt);
  if(!list.length && !scanning) {
    if(filt!=='ALL') { zone.innerHTML=`<div class="empty">No hay señales de ${filt==='BUY'?'compra':'venta'} en este momento.</div>`; return; }
    if(!results.length && errors.length===UNIVERSE.length+customSyms.length) {
      zone.innerHTML=`<div class="connerr"><p>No se pudo conectar con el mercado financiero. Comprueba tu conexión a internet.</p><button class="retbtn" onclick="startScan()">Reintentar</button></div>`;
      return;
    }
    if(!scanning && results.length===0 && errors.length>0)
      zone.innerHTML=`<div class="empty">Sin datos disponibles. Intenta de nuevo.</div>`;
    else if(!scanning)
      zone.innerHTML='<div class="empty">Mercado en calma. Sin confluencias activas.</div>';
    return;
  }
  zone.innerHTML=list.map(cardHTML).join('');
}

function renderStats() {
  const buys=results.filter(r=>r.cf.action==='BUY').length;
  const sells=results.filter(r=>r.cf.action==='SELL').length;
  document.getElementById('st0').textContent=scanning?`${scanDone}/${scanTotal}`:results.length||'—';
  document.getElementById('st1').textContent=buys||'—';
  document.getElementById('st2').textContent=sells||'—';
}

function renderProg() {
  const w=document.getElementById('pgwrap');
  if(!scanning){w.style.display='none';return;}
  w.style.display='block';
  const p=scanTotal>0?Math.round(scanDone/scanTotal*100):0;
  document.getElementById('pglbl').textContent=`Analizando ${scanDone}/${scanTotal} activos…`;
  document.getElementById('pgpct').textContent=p+'%';
  document.getElementById('pgbar').style.width=p+'%';
}

function renderErrors() {
  document.getElementById('errs').innerHTML=errors.map(e=>`<div class="errl">⚠ ${e.sym}: ${e.msg}</div>`).join('');
}

// ── Alertas / banner ─────────────────────────────────────────────
function showBanner(d) {
  const isBuy=d.cf.action==='BUY';
  document.getElementById('banner').className=isBuy?'buy':'sell';
  document.getElementById('btitle').textContent=`${isBuy?'▲':'▼'} ${d.sym}: ${isBuy?'Punto de entrada':'Señal de venta'}`;
  document.getElementById('btext').textContent=`${d.cf.count}/${d.cf.total} estrategias: ${d.cf.names.join(', ')}.`;
  if('vibrate'in navigator) navigator.vibrate([80,40,80]);
  if(notifOn&&'Notification'in window&&Notification.permission==='granted') {
    new Notification(`${isBuy?'▲ Compra':'▼ Venta'} — ${d.sym}`,
      {body:`${d.cf.count}/${d.cf.total} estrategias: ${d.cf.names.join(', ')}.`});
  }
  clearTimeout(window._bt);
  window._bt=setTimeout(closeBanner,7000);
}
function closeBanner() {
  document.getElementById('banner').className='';
  clearTimeout(window._bt);
}

// ── Scanner ──────────────────────────────────────────────────────
function insertSorted(arr, item) {
  const score=x=>x.cf.action==='NONE'?0:x.cf.count+(x.cf.action==='BUY'?.01:0);
  const sc=score(item);
  let idx=arr.length;
  for(let i=0;i<arr.length;i++) { if(sc>score(arr[i])){idx=i;break;} }
  arr.splice(idx,0,item);
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function startScan() {
  if(scanning) return;
  scanning=true; results=[]; errors=[];
  const univ=[...customSyms.map(s=>({sym:s,sec:'Custom'})),...UNIVERSE];
  scanTotal=univ.length; scanDone=0;

  // Botón spin
  const rb=document.getElementById('rbtn');
  rb.classList.remove('spin');
  void rb.offsetWidth; // reflow para reiniciar animación
  rb.classList.add('spin');
  setTimeout(()=>rb.classList.remove('spin'),700);

  document.getElementById('stxt').textContent='Escaneando mercado…';
  renderProg(); renderStats(); renderErrors();
  document.getElementById('zone').innerHTML='';

  const BATCH=3;
  for(let i=0;i<univ.length;i+=BATCH) {
    const batch=univ.slice(i,i+BATCH);
    const settled=await Promise.allSettled(batch.map(async({sym,sec})=>{
      const json=await fetchYahoo(sym);
      const series=parseYahoo(json,sym,sec);
      const strategies=evaluate(series);
      const cf=calcConfl(strategies);
      return {...series, strategies, cf};
    }));
    settled.forEach(res=>{
      scanDone++;
      if(res.status==='fulfilled') {
        const d=res.value;
        insertSorted(results,d);
        const prev=prevCF[d.sym]??'NONE';
        if(d.cf.action!=='NONE'&&d.cf.action!==prev) showBanner(d);
        prevCF[d.sym]=d.cf.action;
      } else {
        const sym=batch[settled.indexOf(res)]?.sym??'?';
        errors.push({sym, msg: res.reason?.message??'Error'});
      }
    });
    renderProg(); renderStats(); renderErrors(); renderCards();
    if(i+BATCH<univ.length) await sleep(350);
  }

  scanning=false;
  const t=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('stxt').textContent=`Escaneado ${t} · ${results.length} activos`;
  renderProg(); renderStats(); renderErrors(); renderCards();

  clearInterval(pollTimer);
  pollTimer=setInterval(startScan,5*60*1000); // re-escanea cada 5 min
}

// ── Filtros ──────────────────────────────────────────────────────
function setF(f) {
  filt=f;
  document.getElementById('ta').className='tab'+(f==='ALL'?' ta':'');
  document.getElementById('tb').className='tab'+(f==='BUY'?' tb':'');
  document.getElementById('ts').className='tab'+(f==='SELL'?' ts':'');
  renderCards();
}

// ── Añadir símbolo ───────────────────────────────────────────────
function onAI() {
  const v=document.getElementById('ainp').value.trim();
  document.getElementById('abtn').disabled=!/^[A-Za-z0-9.\-\^=]{1,12}$/.test(v);
}
function addCustom() {
  const inp=document.getElementById('ainp');
  const sym=inp.value.trim().toUpperCase();
  if(!/^[A-Za-z0-9.\-\^=]{1,12}$/.test(sym)) return;
  if(!customSyms.includes(sym)&&!UNIVERSE.find(u=>u.sym===sym)) {
    customSyms.unshift(sym); saveCS();
  }
  inp.value=''; onAI(); startScan();
}

// ── Notificaciones ───────────────────────────────────────────────
async function toggleNotif() {
  if(!('Notification'in window)) {
    alert('Para notificaciones en iPhone:\n\nEn Safari → Compartir → "Añadir a pantalla de inicio"\nLuego abre la app desde el icono de tu inicio.');
    return;
  }
  if(Notification.permission==='granted') {
    notifOn=!notifOn;
  } else {
    notifOn=await Notification.requestPermission()==='granted';
  }
  document.getElementById('nbtn').textContent=notifOn?'🔔':'🔕';
  document.getElementById('nbtn').classList.toggle('on',notifOn);
}

// ── Arranque ─────────────────────────────────────────────────────
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&!scanning) startScan();
});
startScan();
</script>
